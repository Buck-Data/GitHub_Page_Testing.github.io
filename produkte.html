<header class="site-header">
  <nav class="nav">
    <a class="nav-logo" href="index.html">🛍️ GTM Lernshop</a>
    <ul class="nav-links">
      <li><a href="index.html">Start</a></li>
      <li><a href="produkte.html"><strong>Shop</strong></a></li>
      <li><a href="kontakt.html">Kontakt</a></li>
      <li><a href="warenkorb.html">Warenkorb <span id="cart-count" class="cart-badge" style="display:none">0</span></a></li>
    </ul>
  </nav>
</header>

<div class="container" style="margin-top:2rem;">
  <h1 class="section-title">Alle Produkte</h1>

  <div class="toolbar">
    <input type="search" id="search-input" placeholder="Produkte durchsuchen …">
    <button class="chip active" data-category="Alle">Alle</button>
  </div>
  <div class="toolbar" id="category-chips" style="margin-top:-0.75rem;"></div>

  <div class="product-grid" id="product-grid"></div>
  <p id="no-results" class="empty-state" style="display:none;">Keine Produkte gefunden.</p>
</div>

<footer class="site-footer">
  <div class="container">
    <div>
      <p>GTM Lernshop – Demo-Seite zum Üben von GA4 &amp; Google Tag Manager.<br>Keine echten Produkte, keine echte Bestellung.</p>
    </div>
    <div>
      <form id="newsletter-form" class="newsletter-form" novalidate>
        <input type="email" id="newsletter-email" placeholder="deine@email.de" required>
        <button type="submit" class="btn btn-primary">Newsletter abonnieren</button>
      </form>
    </div>
  </div>
</footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/analytics.js"></script>
<script>
  const grid = document.getElementById("product-grid");
  const noResults = document.getElementById("no-results");
  let activeCategory = "Alle";
  let searchTimer = null;

  function renderProducts(list, listName) {
    grid.innerHTML = list.map(p => `
      <div class="product-card">
        <a href="produkt.html?id=${p.id}" class="js-select-item" data-id="${p.id}" data-list="${listName}">
          <div class="product-thumb">${p.icon}</div>
        </a>
        <div class="product-card-body">
          <span class="product-category">${p.category}</span>
          <span class="product-name"><a href="produkt.html?id=${p.id}" class="js-select-item" data-id="${p.id}" data-list="${listName}">${p.name}</a></span>
          <span class="product-price">${p.price.toFixed(2)} €</span>
        </div>
      </div>
    `).join("");
    noResults.style.display = list.length === 0 ? "block" : "none";

    document.querySelectorAll(".js-select-item").forEach(el => {
      el.addEventListener("click", () => {
        const product = getProductById(el.dataset.id);
        trackEvent({
          event: "select_item",
          item_list_name: el.dataset.list,
          ecommerce: { items: [toGa4Item(product)] }
        });
      });
    });
  }

  function applyFilters(fireEvent) {
    const term = document.getElementById("search-input").value.trim().toLowerCase();
    let list = PRODUCTS;
    if (activeCategory !== "Alle") list = list.filter(p => p.category === activeCategory);
    if (term) list = list.filter(p => p.name.toLowerCase().includes(term));

    const listName = term ? "Suchergebnisse" : activeCategory;
    renderProducts(list, listName);

    if (fireEvent === "search" && term) {
      trackEvent({ event: "search", search_term: term });
    } else if (fireEvent === "filter") {
      trackEvent({
        event: "view_item_list",
        item_list_name: listName,
        ecommerce: { items: list.map(p => toGa4Item(p)) }
      });
    }
  }

  // Kategorie-Chips aufbauen
  const chipsContainer = document.getElementById("category-chips");
  getCategories().forEach(cat => {
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.textContent = cat;
    chip.dataset.category = cat;
    chipsContainer.appendChild(chip);
  });

  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeCategory = chip.dataset.category;
      applyFilters("filter");
    });
  });

  document.getElementById("search-input").addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => applyFilters("search"), 600);
  });

  // Initiale Ansicht: alle Produkte + view_item_list
  renderProducts(PRODUCTS, "Alle Produkte");
  document.addEventListener("DOMContentLoaded", () => {
    trackEvent({
      event: "view_item_list",
      item_list_name: "Alle Produkte",
      ecommerce: { items: PRODUCTS.map(p => toGa4Item(p)) }
    });
  });
</script>
</body>
</html>
