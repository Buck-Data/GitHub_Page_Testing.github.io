<header class="site-header">
  <nav class="nav">
    <a class="nav-logo" href="index.html">🛍️ GTM Lernshop</a>
    <ul class="nav-links">
      <li><a href="index.html">Start</a></li>
      <li><a href="produkte.html">Shop</a></li>
      <li><a href="kontakt.html">Kontakt</a></li>
      <li><a href="warenkorb.html">Warenkorb <span id="cart-count" class="cart-badge" style="display:none">0</span></a></li>
    </ul>
  </nav>
</header>

<div class="container" style="margin-top:2rem; max-width:600px;">
  <div id="confirmation-content"></div>
</div>

<footer class="site-footer">
  <div class="container">
    <div>
      <p>GTM Lernshop – Demo-Seite zum Üben von GA4 &amp; Google Tag Manager.<br>Keine echten Produkte, keine echte Bestellung.</p>
    </div>
    <div>
      <form id="newsletter-form" class="newsletter-form" novalidate>
        <input type="email" id="newsletter-email" placeholder="deine@email.de" required>
        <button type="submit" class="btn btn-primary">Newsletter abonnieren</button>
      </form>
    </div>
  </div>
</footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/analytics.js"></script>
<script>
  const content = document.getElementById("confirmation-content");
  const orderRaw = sessionStorage.getItem("gtm_demo_last_order");

  if (!orderRaw) {
    content.innerHTML = `
      <div class="empty-state">
        <p>Keine Bestellung gefunden.</p>
        <a href="produkte.html" class="btn btn-primary">Zum Shop</a>
      </div>`;
  } else {
    const order = JSON.parse(orderRaw);

    content.innerHTML = `
      <div class="confirmation-box">
        <div class="confirmation-icon">✅</div>
        <h1>Danke für deine Demo-Bestellung!</h1>
        <p>Bestellnummer: <strong>${order.transaction_id}</strong></p>
        <p>Gesamtbetrag: <strong>${order.value.toFixed(2)} €</strong></p>
        <p style="color:var(--color-muted); font-size:0.9rem;">Dies ist keine echte Bestellung – es wurde nichts verschickt oder bezahlt.</p>
        <a href="produkte.html" class="btn btn-secondary">Weiter einkaufen</a>
      </div>
    `;

    // Dedupe-Schutz: Das purchase-Event darf pro Bestellung nur EINMAL feuern,
    // auch wenn diese Seite neu geladen wird (z.B. per F5). Ein typischer
    // Stolperstein bei echten GA4-Ecommerce-Implementierungen.
    const firedKey = "gtm_demo_purchase_fired_" + order.transaction_id;
    if (!sessionStorage.getItem(firedKey)) {
      document.addEventListener("DOMContentLoaded", () => {
        trackEcommerceEvent("purchase", {
          transaction_id: order.transaction_id,
          currency: order.currency,
          value: order.value,
          tax: order.tax,
          shipping: order.shipping,
          items: order.items
        });
        sessionStorage.setItem(firedKey, "true");
        clearCart();
      });
    }
  }
</script>
</body>
</html>
