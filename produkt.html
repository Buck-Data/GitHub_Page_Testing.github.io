<header class="site-header">

      <li><a href="index.html">Start</a></li>

    </ul>
  </nav>
</header>

<div class="container" style="margin-top:2rem;">
  <p><a href="produkte.html">← Zurück zum Shop</a></p>
  <div id="product-container"></div>
  <p id="not-found" class="empty-state" style="display:none;">Produkt nicht gefunden. <a href="produkte.html">Zurück zum Shop</a></p>
</div>

<footer class="site-footer">
  <div class="container">
    <div>
      <p>GTM Lernshop – Demo-Seite zum Üben von GA4 &amp; Google Tag Manager.<br>Keine echten Produkte, keine echte Bestellung.</p>
    </div>
    <div>
      <form id="newsletter-form" class="newsletter-form" novalidate>
        <input type="email" id="newsletter-email" placeholder="deine@email.de" required>
        <button type="submit" class="btn btn-primary">Newsletter abonnieren</button>
      </form>
    </div>
  </div>
</footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/analytics.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const product = getProductById(params.get("id"));
  const container = document.getElementById("product-container");

  if (!product) {
    document.getElementById("not-found").style.display = "block";
  } else {
    document.title = product.name + " – GTM Lernshop";
    container.innerHTML = `
      <div class="product-detail">
        <div class="product-detail-image">${product.icon}</div>
        <div>
          <span class="product-category">${product.category}</span>
          <h1>${product.name}</h1>
          <p class="price-tag">${product.price.toFixed(2)} €</p>
          <p>${product.description}</p>
          <div class="qty-control">
            <button type="button" id="qty-minus">−</button>
            <input type="text" id="qty-value" value="1" readonly>
            <button type="button" id="qty-plus">+</button>
          </div>
          <button class="btn btn-primary btn-block" id="add-to-cart-btn">In den Warenkorb</button>
        </div>
      </div>
    `;

    let quantity = 1;
    const qtyValue = document.getElementById("qty-value");
    document.getElementById("qty-minus").addEventListener("click", () => {
      quantity = Math.max(1, quantity - 1);
      qtyValue.value = quantity;
    });
    document.getElementById("qty-plus").addEventListener("click", () => {
      quantity += 1;
      qtyValue.value = quantity;
    });

    document.getElementById("add-to-cart-btn").addEventListener("click", () => {
      addToCart(product.id, quantity);
      trackEcommerceEvent("add_to_cart", {
        currency: CURRENCY,
        value: product.price * quantity,
        items: [toGa4Item(product, quantity)]
      });
      showToast(`${product.name} (${quantity}x) wurde in den Warenkorb gelegt.`);
    });

    document.addEventListener("DOMContentLoaded", () => {
      trackEcommerceEvent("view_item", {
        currency: CURRENCY,
        value: product.price,
        items: [toGa4Item(product)]
      });
    });
  }
</script>
</body>
</html>
