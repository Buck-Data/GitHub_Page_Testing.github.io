<div class="container" style="margin-top:2rem;">
  <h1 class="section-title">Dein Warenkorb</h1>
  <div id="cart-content"></div>
</div>

<footer class="site-footer">
  <div class="container">
    <div>
      <p>GTM Lernshop – Demo-Seite zum Üben von GA4 &amp; Google Tag Manager.<br>Keine echten Produkte, keine echte Bestellung.</p>
    </div>
    <div>
      <form id="newsletter-form" class="newsletter-form" novalidate>
        <input type="email" id="newsletter-email" placeholder="deine@email.de" required>
        <button type="submit" class="btn btn-primary">Newsletter abonnieren</button>
      </form>
    </div>
  </div>
</footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/analytics.js"></script>
<script>
  const cartContent = document.getElementById("cart-content");

  function renderCart() {
    const items = getCartWithProductData();

    if (items.length === 0) {
      cartContent.innerHTML = `
        <div class="empty-state">
          <p>Dein Warenkorb ist leer.</p>
          <a href="produkte.html" class="btn btn-primary">Jetzt einkaufen</a>
        </div>`;
      return;
    }

    const rows = items.map(item => `
      <tr data-id="${item.id}">
        <td class="cart-row-thumb">${item.icon}</td>
        <td>${item.name}<br><span class="product-category">${item.category}</span></td>
        <td>${item.price.toFixed(2)} €</td>
        <td>
          <div class="qty-control">
            <button type="button" class="js-qty-minus" data-id="${item.id}">−</button>
            <input type="text" value="${item.quantity}" readonly style="width:2.5rem;">
            <button type="button" class="js-qty-plus" data-id="${item.id}">+</button>
          </div>
        </td>
        <td>${(item.price * item.quantity).toFixed(2)} €</td>
        <td><button type="button" class="btn btn-danger js-remove" data-id="${item.id}">Entfernen</button></td>
      </tr>
    `).join("");

    const total = getCartTotal();

    cartContent.innerHTML = `
      <table class="cart-table">
        <thead>
          <tr><th></th><th>Produkt</th><th>Preis</th><th>Menge</th><th>Summe</th><th></th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="cart-summary">
        <div class="cart-summary-row cart-summary-total"><span>Gesamt</span><span>${total.toFixed(2)} €</span></div>
        <a href="kasse.html" class="btn btn-primary btn-block" style="margin-top:1rem;">Zur Kasse</a>
      </div>
    `;

    document.querySelectorAll(".js-remove").forEach(btn => {
      btn.addEventListener("click", () => {
        const product = getProductById(btn.dataset.id);
        const cartItem = getCartWithProductData().find(i => i.id === product.id);
        trackEcommerceEvent("remove_from_cart", {
          currency: CURRENCY,
          value: product.price * cartItem.quantity,
          items: [toGa4Item(product, cartItem.quantity)]
        });
        removeFromCart(product.id);
        renderCart();
      });
    });

    document.querySelectorAll(".js-qty-plus").forEach(btn => {
      btn.addEventListener("click", () => {
        const product = getProductById(btn.dataset.id);
        const cartItem = getCartWithProductData().find(i => i.id === product.id);
        setQuantity(product.id, cartItem.quantity + 1);
        trackEcommerceEvent("add_to_cart", {
          currency: CURRENCY,
          value: product.price,
          items: [toGa4Item(product, 1)]
        });
        renderCart();
      });
    });

    document.querySelectorAll(".js-qty-minus").forEach(btn => {
      btn.addEventListener("click", () => {
        const product = getProductById(btn.dataset.id);
        const cartItem = getCartWithProductData().find(i => i.id === product.id);
        if (cartItem.quantity <= 1) return;
        setQuantity(product.id, cartItem.quantity - 1);
        trackEcommerceEvent("remove_from_cart", {
          currency: CURRENCY,
          value: product.price,
          items: [toGa4Item(product, 1)]
        });
        renderCart();
      });
    });
  }

  renderCart();

  document.addEventListener("DOMContentLoaded", () => {
    const items = getCartWithProductData();
    if (items.length > 0) {
      trackEcommerceEvent("view_cart", {
        currency: CURRENCY,
        value: getCartTotal(),
        items: items.map(i => toGa4Item(i, i.quantity))
      });
    }
  });
</script>
</body>
</html>
